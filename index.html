<!doctype html>
<html lang="zh-CN">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ForwardX转发管理面板</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card">
          <div class="boot-logo">
            <img src="/logo-light.png" alt="ForwardX" />
          </div>
          <svg class="boot-spinner" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(37, 99, 235, 0.18)" stroke-width="3" />
            <circle cx="16" cy="16" r="13" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-dasharray="24 58">
              <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="0.85s" repeatCount="indefinite" />
            </circle>
          </svg>
          <div class="boot-text">加载中</div>
        </div>
      </div>
    </div>
    <script type="module" src="/client/src/main.tsx"></script>
  </body>

</html>
